version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: notifydb
      POSTGRES_USER: notify
      POSTGRES_PASSWORD: notify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: .
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notifydb
      SPRING_DATASOURCE_USERNAME: notify
      SPRING_DATASOURCE_PASSWORD: notify
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
