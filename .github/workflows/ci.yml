name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "benchmark/**/results.md"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: notifydb
          POSTGRES_USER: notify
          POSTGRES_PASSWORD: notify
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Make mvnw executable
        run: chmod +x ./mvnw
      - name: Run tests
        run: ./mvnw test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/notifydb
          SPRING_DATASOURCE_USERNAME: notify
          SPRING_DATASOURCE_PASSWORD: notify
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/feat/sync-baseline' || github.ref == 'refs/heads/feat/async-dispatch'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: notifydb
          POSTGRES_USER: notify
          POSTGRES_PASSWORD: notify
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build JAR
        run: ./mvnw package -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/notifydb
          SPRING_DATASOURCE_USERNAME: notify
          SPRING_DATASOURCE_PASSWORD: notify
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      - name: Start application
        run: |
          nohup java -jar target/spring-notify-engine-*.jar > app.log 2>&1 &
          echo $! > .app.pid
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/notifydb
          SPRING_DATASOURCE_USERNAME: notify
          SPRING_DATASOURCE_PASSWORD: notify
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      - name: Wait for application to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health 2>/dev/null | grep -q '"status":"UP"'; then
              echo "Application ready after ${i}s"
              exit 0
            fi
            echo "Waiting... attempt $i"
            sleep 2
          done
          echo "Application did not start in time"
          cat app.log
          exit 1

      - name: Install JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Run JMeter benchmark
        run: |
          mkdir -p benchmark/load-test
          JVM_ARGS="-Xmx1g" jmeter -n \
            -t benchmark/load-test/test-plan.jmx \
            -l benchmark/load-test/results.jtl \
            -Jjmeter.save.saveservice.output_format=csv \
            -j benchmark/load-test/jmeter.log

      - name: Extract benchmark metrics
        run: |
          python3 - <<'PYEOF'
          import csv, statistics, os, sys

          jtl = 'benchmark/load-test/results.jtl'
          if not os.path.exists(jtl):
              print("No results file"); sys.exit(1)

          with open(jtl) as f:
              rows = [r for r in csv.DictReader(f) if r.get('elapsed')]

          if not rows:
              print("Empty results"); sys.exit(1)

          latencies  = [int(r['elapsed'])   for r in rows]
          timestamps = [int(r['timeStamp']) for r in rows]
          avg_ms     = statistics.mean(latencies)
          p99_ms     = sorted(latencies)[int(len(latencies) * 0.99)]
          duration_s = (max(timestamps) - min(timestamps) + avg_ms) / 1000
          throughput = len(latencies) / duration_s
          errors     = sum(1 for r in rows if r.get('success', '').lower() != 'true')
          error_pct  = errors / len(rows) * 100

          row = "| {:<20} | {:<20} |\n".format
          sep = "|{:-<22}|{:-<22}|\n".format

          md  = "# Load Test - JMeter Results\n\n"
          md += row("Metric", "Value")
          md += sep("", "")
          md += row("Avg Latency", f"{avg_ms:.0f}ms")
          md += row("P99 Latency", f"{p99_ms}ms")
          md += row("Throughput", f"{throughput:.1f} req/s")
          md += row("Concurrent Users", "1000")
          md += row("Total Requests", str(len(rows)))
          md += row("Error Rate", f"{error_pct:.1f}%")
          md += row("Endpoint", "POST /notifications")
          md += "\nResults printed to CI log — commit results.md manually after reviewing.\n"

          print(md)
          print(f"Done - avg {avg_ms:.0f}ms, {throughput:.1f} req/s, {error_pct:.1f}% errors")
          PYEOF
